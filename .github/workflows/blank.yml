name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch: # Ye aapko manually build run karne ka option dega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download Morphe Tools
        run: |
          mkdir -p tools
          # Morphe releases se latest links update karein
          wget -qO tools/cli.jar https://github.com/MorpheApp/morphe-cli/releases/latest/download/morphe-cli.jar
          wget -qO tools/patches.jar https://github.com/MorpheApp/morphe-patches/releases/latest/download/morphe-patches.jar
          wget -qO tools/integrations.apk https://github.com/MorpheApp/morphe-integrations/releases/latest/download/morphe-integrations.apk

      - name: Download Original APKs
        run: |
          mkdir -p apks
          # Yaha aapko original APKs ke direct download links dene honge.
          # Example (Aapko in links ko actual direct links se replace karna hoga):
          # wget -qO apks/youtube.apk "DIRECT_YOUTUBE_APK_LINK"
          # wget -qO apks/ytmusic.apk "DIRECT_YTMUSIC_APK_LINK"
          # wget -qO apks/reddit.apk "DIRECT_REDDIT_APK_LINK"
          echo "Please ensure you have valid direct links for original APKs in the workflow file."

      - name: Build Non-Root APKs (Standard)
        run: |
          # Non-root devices ke liye standard patching (MicroG support ke sath)
          java -jar tools/cli.jar patch -p tools/patches.jar -i tools/integrations.apk -o YouTube-Morphe-NonRoot.apk apks/youtube.apk
          java -jar tools/cli.jar patch -p tools/patches.jar -i tools/integrations.apk -o YTMusic-Morphe-NonRoot.apk apks/ytmusic.apk
          java -jar tools/cli.jar patch -p tools/patches.jar -i tools/integrations.apk -o Reddit-Morphe-NonRoot.apk apks/reddit.apk

      - name: Build Root APKs (For Magisk)
        run: |
          # Root variants ke liye 'GmsCore support' (MicroG) patch ko exclude (-e) karna zaruri hai
          java -jar tools/cli.jar patch -p tools/patches.jar -i tools/integrations.apk -e "GmsCore support" -o YouTube-Root.apk apks/youtube.apk
          java -jar tools/cli.jar patch -p tools/patches.jar -i tools/integrations.apk -e "GmsCore support" -o YTMusic-Root.apk apks/ytmusic.apk
          # Reddit ke liye root module ki zarurat nahi hoti, isliye usey skip kiya gaya hai.

      - name: Create Magisk Modules
        run: |
          # Ek standard Magisk template download karein
          git clone https://github.com/LSPosed/magisk-module-template.git template
          rm -rf template/.git

          # YouTube Magisk Module banayein
          cp -r template yt-magisk
          mkdir -p yt-magisk/system/product/app/YouTube
          cp YouTube-Root.apk yt-magisk/system/product/app/YouTube/YouTube.apk
          sed -i 's/id=template/id=morphe-youtube/g' yt-magisk/module.prop
          sed -i 's/name=Magisk Module Template/name=YouTube Morphe (Root)/g' yt-magisk/module.prop
          cd yt-magisk && zip -r9 ../YouTube-Morphe-Magisk.zip . && cd ..

          # YT Music Magisk Module banayein
          cp -r template ytm-magisk
          mkdir -p ytm-magisk/system/product/app/YTMusic
          cp YTMusic-Root.apk ytm-magisk/system/product/app/YTMusic/YTMusic.apk
          sed -i 's/id=template/id=morphe-ytmusic/g' ytm-magisk/module.prop
          sed -i 's/name=Magisk Module Template/name=YT Music Morphe (Root)/g' ytm-magisk/module.prop
          cd ytm-magisk && zip -r9 ../YTMusic-Morphe-Magisk.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Morphe Patched Builds #${{ github.run_number }}"
          files: |
            YouTube-Morphe-NonRoot.apk
            YTMusic-Morphe-NonRoot.apk
            Reddit-Morphe-NonRoot.apk
            YouTube-Morphe-Magisk.zip
            YTMusic-Morphe-Magisk.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

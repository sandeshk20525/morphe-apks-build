name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch: # Ye aapko manually build run karne ka option dega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download Morphe Tools
        run: |
          mkdir -p tools
          
          # GitHub API se automatically latest CLI ka link fetch karna
          echo "Fetching latest Morphe CLI..."
          CLI_URL=$(curl -s https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest | grep "browser_download_url.*\.jar" | cut -d '"' -f 4 | head -n 1)
          echo "Downloading CLI from: $CLI_URL"
          wget -qO tools/cli.jar "$CLI_URL"
          
          # GitHub API se automatically latest Patches ka link fetch karna (supports .jar, .mpp, .rvp)
          echo "Fetching latest Morphe Patches..."
          PATCHES_URL=$(curl -s https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest | grep "browser_download_url" | grep -E "\.jar|\.rvp|\.mpp" | cut -d '"' -f 4 | head -n 1)
          PATCH_EXT="${PATCHES_URL##*.}"
          echo "Downloading Patches from: $PATCHES_URL"
          wget -qO "tools/patches.$PATCH_EXT" "$PATCHES_URL"
          
          # Check karna ki files theek se download hui hain ya nahi
          if [ ! -s tools/cli.jar ]; then echo "CLI download failed!"; exit 1; fi

      - name: Download Original APKs
        run: |
          mkdir -p apks
          
          # 1. Auto-fetch YouTube APK from Archive.org
          echo "Scanning for YouTube APK..."
          YT_BASE="https://archive.org/download/jhc-apks/apks/com.google.android.youtube/"
          YT_APK=$(curl -s "$YT_BASE" | grep -oP 'href="\K[^"]+\.apk' | sort | tail -n 1)
          echo "Downloading $YT_APK"
          wget -O apks/youtube.apk "${YT_BASE}${YT_APK}"
          
          # 2. Auto-fetch YT Music APK from Archive.org
          echo "Scanning for YT Music APK..."
          YTM_BASE="https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music/"
          YTM_APK=$(curl -s "$YTM_BASE" | grep -oP 'href="\K[^"]+\.apk' | sort | tail -n 1)
          echo "Downloading $YTM_APK"
          wget -O apks/ytmusic.apk "${YTM_BASE}${YTM_APK}"
          
      - name: Verify APK Downloads
        run: |
          echo "Checking downloaded APK sizes..."
          ls -lh apks/
          # Ye check karega ki file theek se download hui hai ya nahi (kam se kam 10MB ki honi chahiye)
          if [ ! -s apks/youtube.apk ] || [ $(stat -c%s "apks/youtube.apk") -lt 10000000 ]; then echo "YouTube APK download failed or is invalid!"; exit 1; fi
          if [ ! -s apks/ytmusic.apk ] || [ $(stat -c%s "apks/ytmusic.apk") -lt 10000000 ]; then echo "YT Music APK download failed or is invalid!"; exit 1; fi

      - name: Build Non-Root APKs (Standard)
        run: |
          # '*' ka use kiya hai taaki extension (.jar ya .mpp) khud pakad le
          java -jar tools/cli.jar patch -p tools/patches.* -o YouTube-Morphe-NonRoot.apk apks/youtube.apk
          java -jar tools/cli.jar patch -p tools/patches.* -o YTMusic-Morphe-NonRoot.apk apks/ytmusic.apk

      - name: Build Root APKs (For Magisk)
        run: |
          java -jar tools/cli.jar patch -p tools/patches.* -e "GmsCore support" -o YouTube-Root.apk apks/youtube.apk
          java -jar tools/cli.jar patch -p tools/patches.* -e "GmsCore support" -o YTMusic-Root.apk apks/ytmusic.apk

      - name: Create Magisk Modules
        run: |
          # LSPosed ki jagah ReVanced ka official template use kar rahe hain
          git clone https://github.com/revanced/magisk-module-template.git template
          rm -rf template/.git

          # YouTube Magisk Module
          cp -r template yt-magisk
          mkdir -p yt-magisk/system/product/app/YouTube
          cp YouTube-Root.apk yt-magisk/system/product/app/YouTube/YouTube.apk
          
          # Naya module.prop generate karna (foolproof method)
          cat <<EOF > yt-magisk/module.prop
          id=morphe-youtube
          name=YouTube Morphe (Root)
          version=v1.0
          versionCode=1
          author=MorpheApp Builder
          description=Systemless Morphe Patched YouTube module.
          EOF
          
          cd yt-magisk && zip -r9 ../YouTube-Morphe-Magisk.zip . && cd ..

          # YT Music Magisk Module
          cp -r template ytm-magisk
          mkdir -p ytm-magisk/system/product/app/YTMusic
          cp YTMusic-Root.apk ytm-magisk/system/product/app/YTMusic/YTMusic.apk
          
          # Naya module.prop generate karna (foolproof method)
          cat <<EOF > ytm-magisk/module.prop
          id=morphe-ytmusic
          name=YT Music Morphe (Root)
          version=v1.0
          versionCode=1
          author=MorpheApp Builder
          description=Systemless Morphe Patched YouTube Music module.
          EOF
          
          cd ytm-magisk && zip -r9 ../YTMusic-Morphe-Magisk.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Morphe Patched Builds #${{ github.run_number }}"
          files: |
            YouTube-Morphe-NonRoot.apk
            YTMusic-Morphe-NonRoot.apk
            YouTube-Morphe-Magisk.zip
            YTMusic-Morphe-Magisk.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
